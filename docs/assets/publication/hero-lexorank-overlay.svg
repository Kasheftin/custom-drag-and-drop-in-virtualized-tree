<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">LexoRank publication hero typography</title>
  <desc id="desc">Editorial title overlay for the LexoRank article cover.</desc>
  <defs>
    <linearGradient id="leftShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#061220" stop-opacity=".98"/>
      <stop offset=".28" stop-color="#061220" stop-opacity=".83"/>
      <stop offset=".52" stop-color="#061220" stop-opacity=".2"/>
      <stop offset=".72" stop-color="#061220" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1ec8bb"/>
      <stop offset=".52" stop-color="#ff9b52"/>
      <stop offset="1" stop-color="#8b7cf6"/>
    </linearGradient>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#000" flood-opacity=".42"/>
    </filter>
    <style>
      .sans{font-family:Inter,"Segoe UI",Arial,sans-serif}.mono{font-family:"Cascadia Mono",Consolas,monospace}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#leftShade)"/>
  <rect x="1.5" y="1.5" width="1917" height="1077" rx="30" fill="none" stroke="#8aa2b6" stroke-opacity=".18" stroke-width="3"/>

  <g filter="url(#textShadow)">
    <text x="112" y="190" class="sans" font-size="31" font-weight="800" letter-spacing="7" fill="#1ec8bb">PERSISTENT ORDERING AT SCALE</text>
    <text x="104" y="348" class="sans" font-size="132" font-weight="800" letter-spacing="-5" fill="#ffffff">LEXORANK</text>
    <rect x="112" y="385" width="580" height="7" rx="3.5" fill="url(#accent)"/>
    <text x="112" y="460" class="sans" font-size="35" font-weight="600" fill="#dce7ef">Dense intervals · Local repair</text>
    <text x="112" y="508" class="sans" font-size="35" font-weight="600" fill="#dce7ef">Buckets · Online rebalancing</text>
  </g>

  <g transform="translate(112 760)">
    <rect width="390" height="88" rx="25" fill="#10283b" fill-opacity=".9" stroke="#4e687c" stroke-width="2"/>
    <circle cx="48" cy="44" r="18" fill="#1ec8bb"/><text x="48" y="52" text-anchor="middle" class="sans" font-size="22" font-weight="850" fill="#06211f">0</text>
    <text x="87" y="54" class="mono" font-size="29" font-weight="700" fill="#e9f3f8">→</text>
    <circle cx="145" cy="44" r="18" fill="#ff9b52"/><text x="145" y="52" text-anchor="middle" class="sans" font-size="22" font-weight="850" fill="#2b1608">1</text>
    <text x="184" y="54" class="mono" font-size="29" font-weight="700" fill="#e9f3f8">→</text>
    <circle cx="242" cy="44" r="18" fill="#8b7cf6"/><text x="242" y="52" text-anchor="middle" class="sans" font-size="22" font-weight="850" fill="#fff">2</text>
    <text x="281" y="54" class="mono" font-size="29" font-weight="700" fill="#e9f3f8">→ 0</text>
  </g>

  <text x="112" y="940" class="mono" font-size="26" fill="#94a9b9">bucket | rank-body</text>
  <text x="112" y="990" class="sans" font-size="24" fill="#8095a6">Alexey Kuznetsov · frontend systems</text>
</svg>
